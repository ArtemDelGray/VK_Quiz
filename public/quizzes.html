<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои квизы - Quiz Service</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .quiz-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb; position: relative; overflow: hidden; }
        .quiz-card h3 { margin: 0 0 10px 0; color: var(--primary-blue); padding-right: 25px; }
        .quiz-card .meta { font-size: 0.85rem; color: #6b7280; }
        
        .add-quiz-btn { 
            background: var(--primary-blue); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
            margin-bottom: 20px; 
        }
        .add-quiz-btn:hover { background: #2563eb; }

        .delete-quiz-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            transition: 0.2s;
        }
        .delete-quiz-btn:hover { background: #fee2e2; color: var(--error-red); }

        .delete-confirm-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 20; flex-direction: column; align-items: center; justify-content: center;
        }
        .delete-confirm-overlay.active { display: flex; }
    </style>
</head>
<body>

<header>
    <h1>Quiz Service</h1>
    <div class="header-right">
        <a href="/quizzes.html" class="nav-link" style="color: var(--primary-blue);">Мои квизы</a>
        <div class="user-dropdown">
            <img id="headerAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="header-avatar" onclick="toggleDropdown()">
            <div id="myDropdown" class="dropdown-content">
                <a href="/profile.html">Профиль</a>
                <a href="/logout" style="color: var(--error-red);">Выход</a>
            </div>
        </div>
    </div>
</header>

<div class="container" style="max-width: 1000px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Мои квизы</h2>
        <button class="add-quiz-btn" onclick="location.href='/editor.html'" style="width: auto; padding: 10px 20px; margin-top: 0;">+ Создать новый</button>
    </div>
    
    <div id="quizList" class="quiz-grid">
        <p>Загрузка квизов...</p>
    </div>
</div>

<script>
    function toggleDropdown() { document.getElementById("myDropdown").classList.toggle("show"); }

    function showToast(message, type = 'success') {
        let container = document.getElementById('toastContainer');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container';
            document.body.appendChild(container);
        }
        const toast = document.createElement('div');
        toast.className = `custom-toast ${type}`;
        toast.innerText = message;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.classList.add('fade-out');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    fetch('/profile-data').then(r => r.json()).then(d => {
        if(d.avatar) document.getElementById('headerAvatar').src = d.avatar;
    });

    async function loadQuizzes() {
        const res = await fetch('/my-quizzes-data');
        const data = await res.json();
        const list = document.getElementById('quizList');
        list.innerHTML = '';

        if (data.length === 0) {
            list.innerHTML = '<p>У вас пока нет созданных квизов.</p>';
            return;
        }

        data.forEach(q => {
            list.innerHTML += `
                <div class="quiz-card" id="quiz_${q.id}">
                    <button class="delete-quiz-btn" onclick="showDeleteConfirm('${q.id}')" title="Удалить квиз">×</button>
                    
                    <div class="delete-confirm-overlay" id="confirm_${q.id}">
                        <p style="font-weight:bold; color:var(--text-main); margin-bottom:15px;">Удалить этот квиз?</p>
                        <div style="display:flex; gap:10px; width:200px;">
                            <button onclick="deleteQuiz('${q.id}')" style="margin:0; background:var(--error-red); padding: 8px; flex: 1;">Да</button>
                            <button onclick="hideDeleteConfirm('${q.id}')" class="secondary-btn" style="margin:0; padding: 8px; flex: 1;">Отмена</button>
                        </div>
                    </div>

                    <h3>${q.title}</h3>
                    <div class="meta">Категория: ${q.category || 'Общее'}</div>
                    <div class="meta">Вопросов: ${q.questions.length}</div>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button onclick="location.href='/editor.html?edit=${q.id}'" class="secondary-btn" style="margin:0; padding: 8px; flex: 1;">Изменить</button>
                        <button onclick="location.href='/preview.html?id=${q.id}'" style="margin:0; padding: 8px; flex: 1;">Предпросмотр</button>
                    </div>
                </div>
            `;
        });
    }

    function showDeleteConfirm(id) { document.getElementById(`confirm_${id}`).classList.add('active'); }
    function hideDeleteConfirm(id) { document.getElementById(`confirm_${id}`).classList.remove('active'); }

    async function deleteQuiz(id) {
        try {
            const res = await fetch(`/delete-quiz/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showToast('Квиз успешно удален', 'success');
                loadQuizzes();
            } else {
                const data = await res.json();
                showToast(data.error || 'Ошибка при удалении', 'error');
            }
        } catch (e) {
            showToast('Ошибка соединения с сервером', 'error');
        }
    }

    loadQuizzes();
</script>
</body>
</html>
